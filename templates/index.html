<!DOCTYPE html>
<html>
<head>
    <title>Must WatchHub</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Must WatchHub </h1>
<p class="subtitle">Find movies, add them to your watchlist, and search with regex.</p>

<form action="/search" class="search-box">
    <input name="pattern" placeholder="Regex search: ^The eller Action|Drama">
    <button>Search</button>
</form>

<a class="link-button" href="/">Show all movies</a>
<a class="link-button" href="/watchlist">My Watchlist</a>

<h2>Movies</h2>

<div class="movie-grid">
    {% for m in movies %}
    <div class="movie-card">
        <h3>{{ m.title }}</h3>
        <p><strong>Year:</strong> {{ m.year }}</p>
        <p><strong>Genre:</strong> {{ m.genre }}</p>
        <p><strong>Runtime:</strong> {{ m.runtime }}</p>
        <p><strong>IMDb Rating:</strong> {{ m.imdb_rating }} </p>

        <form action="/add_watchlist/{{ m.movie_id }}" method="POST">
            <select name="status">
                <option value="want to watch">Want to watch</option>
                <option value="watching">Watching</option>
                <option value="watched">Watched</option>
            </select>
            <button>Add to watchlist</button>
        </form>
    </div>
    {% endfor %}
</div>

</body>
</html>
